<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>N2 文法・聴解</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@700;800&family=Noto+Sans+JP:wght@400;600;800&family=Noto+Sans+TC:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F6F4EE;
  --surface: #FFFFFF;
  --surface2: #EFECE3;
  --border: #DAD5C7;
  --t1: #23252C;
  --t2: #6B6E76;
  --tjp: #23252C;
  --indigo: #25406E;
  --accent: #25406E;
  --shu: #C0413B;
  --green: #2E7D4F;
  --red: #C0413B;
  --orange: #C8942B;
  --tip-bg: #EEF1F6;
  --fs: 15px;
  --mincho: "Shippori Mincho", "Noto Serif JP", "Hiragino Mincho ProN", serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, "Noto Sans JP", "Noto Sans TC", "Hiragino Sans", "Yu Gothic", sans-serif;
  background: var(--bg);
  color: var(--t1);
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  font-size: var(--fs);
}

/* ── HEADER ── */
#header {
  padding: 12px 14px 10px;
  background: var(--bg);
  border-bottom: 3px double var(--indigo);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
  flex-shrink: 0;
}
.h-left { display: flex; flex-direction: column; }
.h-title { font-family: var(--mincho); font-size: 16px; font-weight: 800; color: var(--indigo); letter-spacing: .02em; }
.h-sub { font-size: 10px; color: var(--t2); margin-top: 2px; }
.h-right { display: flex; gap: 6px; align-items: center; }
.hbtn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--t2);
  padding: 5px 9px;
  border-radius: 7px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.hbtn.on { color: var(--indigo); border-color: var(--indigo); background: rgba(37,64,110,.06); }
.hbtn.study-btn { color: #fff; border-color: var(--indigo); background: var(--indigo); }

/* ── MAIN ── */
#main {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 12px 100px;
}

/* cluster header */
.cl-head {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 12px;
}
.cl-badge {
  width: 36px; height: 36px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mincho);
  font-weight: 800; font-size: 16px;
  color: #fff;
  flex-shrink: 0;
}
.cl-info { flex: 1; }
.cl-name { font-family: var(--mincho); font-size: 17px; font-weight: 800; color: var(--indigo); }
.cl-count { font-size: 11px; color: var(--shu); font-weight: 700; margin-top: 1px; }
.cl-desc { font-size: 12px; color: var(--t2); margin-top: 4px; line-height: 1.6; }

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 4px solid transparent;
  border-radius: 6px;
  margin-bottom: 9px;
  overflow: hidden;
  transition: opacity .2s;
}
.card.learned { opacity: 0.45; }
.card:active { opacity: 0.75; }

.card-top {
  padding: 13px 13px 11px 12px;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 9px;
}
.card-num {
  font-size: 10px;
  color: var(--t2);
  min-width: 20px;
  padding-top: 5px;
  font-weight: 600;
}
.card-body-left { flex: 1; min-width: 0; }
.card-pattern {
  font-family: var(--mincho);
  font-size: 20px;
  font-weight: 800;
  color: var(--t1);
  line-height: 1.35;
}
.card-meaning {
  font-size: 12px;
  color: var(--t2);
  margin-top: 4px;
  line-height: 1.5;
}
.card-tags { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
.tag-freq {
  font-size: 10px;
  background: rgba(200,148,43,.14);
  color: #8A6414;
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 700;
}
.card-caret {
  color: var(--border);
  font-size: 12px;
  padding-top: 6px;
  transition: transform .2s;
  flex-shrink: 0;
}
.card.open .card-caret { transform: rotate(180deg); }

.card-detail {
  display: none;
  padding: 0 13px 13px 41px;
}
.card.open .card-detail { display: block; }

.sep { height: 1px; background: var(--border); margin-bottom: 11px; }

.ex-jp {
  font-size: 16px;
  color: var(--t1);
  line-height: 1.8;
  font-weight: 600;
}
.ex-en {
  font-size: 12px;
  color: var(--t2);
  margin-top: 4px;
  line-height: 1.5;
  font-style: italic;
}
.card-note {
  margin-top: 10px;
  background: var(--tip-bg);
  border-radius: 4px;
  padding: 9px 11px;
  font-size: 12px;
  color: var(--t1);
  line-height: 1.65;
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.note-stamp {
  font-family: var(--mincho);
  font-weight: 800;
  color: #fff;
  background: var(--indigo);
  width: 20px; height: 20px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
  margin-top: 1px;
}
.note-text { flex: 1; }
.card-note b { color: var(--shu); }
.done-btn {
  float: right;
  background: none;
  border: 1px solid var(--border);
  color: var(--t2);
  padding: 3px 9px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  margin-bottom: 10px;
}
.done-btn.done { background: rgba(46,125,79,.08); color: var(--green); border-color: rgba(46,125,79,.4); }

/* ── COMPARE SECTION ── */
.cmp-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
  margin-bottom: 10px;
}
.cmp-title {
  font-family: var(--mincho);
  font-size: 13px;
  font-weight: 800;
  color: var(--indigo);
  margin-bottom: 11px;
  letter-spacing: 0.03em;
}
.cmp-table { width: 100%; border-collapse: collapse; }
.cmp-table th {
  font-size: 10px;
  color: var(--t2);
  text-align: left;
  padding: 0 6px 6px 0;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.cmp-table td {
  font-size: 13px;
  color: var(--t1);
  padding: 6px 6px 6px 0;
  border-top: 1px dashed var(--border);
  vertical-align: top;
  line-height: 1.55;
}
.cmp-table td:first-child { color: var(--indigo); font-weight: 700; white-space: nowrap; }
.cmp-ex { font-size: 12px; color: var(--t2); display: block; margin-top: 2px; }
.cmp-vs { text-align: center; color: var(--t2); font-size: 11px; padding: 6px 0; }
.scale-wrap { display: flex; align-items: center; gap: 0; margin: 8px 0 4px; overflow-x: auto; }
.scale-item { text-align: center; flex: 1; min-width: 60px; }
.scale-pat { font-size: 11px; font-weight: 700; color: var(--indigo); }
.scale-desc { font-size: 10px; color: var(--t2); margin-top: 2px; }
.scale-arr { color: var(--shu); padding: 0 2px; font-size: 12px; flex-shrink: 0; }
.scale-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--t2); margin-top: 6px; }

/* ── NAV ── */
#nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  max-width: 480px;
  margin: 0 auto;
  background: rgba(246,244,238,.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  padding: 8px 8px env(safe-area-inset-bottom, 8px);
  display: flex;
  gap: 4px;
  z-index: 50;
}
.ntab {
  flex: 1;
  padding: 8px 4px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--t2);
  border: 1px solid transparent;
  white-space: nowrap;
  transition: all .15s;
  font-family: inherit;
  background: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.ntab-day {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--shu);
}
.ntab-name {
  font-size: 12px;
  font-weight: 800;
}
.ntab.active { background: var(--indigo); color: #fff; }
.ntab.active .ntab-day { color: rgba(255,255,255,.75); }

/* ── RUBY (furigana) ── */
ruby { ruby-position: over; }
rt { font-size: 0.5em; color: var(--t2); font-weight: 500; }
body.hide-ruby rt { display: none; }
.ex-jp, .st-ex-jp { line-height: 2.1; }
.card-pattern { line-height: 1.75; }
.st-pattern { line-height: 1.6; }
.cmp-table td { line-height: 1.95; }

/* ── CHIPS (sub-category picker) ── */
.chips {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 12px;
  scrollbar-width: none;
}
.chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--t2);
  padding: 5px 12px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
}
.chip.active { color: #fff; border-color: transparent; }

/* ── STUDY OVERLAY ── */
#study {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 200;
  display: none;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
}
#study.open { display: flex; }

.st-header {
  padding: 13px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 3px double var(--indigo);
  flex-shrink: 0;
}
.st-info { font-family: var(--mincho); font-size: 13px; color: var(--indigo); font-weight: 800; }
.st-sub { font-size: 11px; color: var(--t2); margin-top: 1px; }
.st-close {
  background: none; border: none;
  color: var(--t2); font-size: 20px;
  cursor: pointer; padding: 4px;
}
.st-prog-wrap { padding: 0 16px 10px; flex-shrink: 0; }
.st-prog { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 10px; }
.st-prog-fill { height: 100%; background: var(--shu); border-radius: 2px; transition: width .3s; }

.st-body {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 16px;
  overflow: hidden;
}
.st-card {
  width: 100%;
  max-width: 400px;
  min-height: 240px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform .45s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
  perspective: 1200px;
}
.st-card.flipped { transform: rotateY(180deg); }

.st-front, .st-back {
  position: absolute;
  inset: 0;
  min-height: 240px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px 22px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.st-back { transform: rotateY(180deg); }

.st-card-id { font-size: 11px; color: var(--shu); font-weight: 700; margin-bottom: 8px; }
.st-pattern { font-family: var(--mincho); font-size: 28px; font-weight: 800; color: var(--indigo); line-height: 1.3; }
.st-meaning { font-size: 15px; color: var(--t2); margin-top: 10px; line-height: 1.5; }
.st-hint { font-size: 11px; color: var(--border); margin-top: 18px; }
.st-ex-jp { font-size: 17px; color: var(--t1); line-height: 1.8; font-weight: 600; }
.st-ex-en { font-size: 12px; color: var(--t2); margin-top: 5px; font-style: italic; line-height: 1.5; }
.st-note { margin-top: 12px; font-size: 11px; color: var(--t1); background: var(--tip-bg); border-radius: 6px; padding: 8px 10px; line-height: 1.6; }

.st-actions {
  display: flex;
  gap: 10px;
  padding: 14px 16px env(safe-area-inset-bottom, 16px);
  flex-shrink: 0;
}
.st-again, .st-good {
  flex: 1; padding: 15px; border-radius: 10px;
  border: 1px solid var(--border); font-size: 14px; font-weight: 800;
  cursor: pointer; font-family: inherit;
  background: var(--surface);
}
.st-again { color: var(--red); border-color: rgba(192,65,59,.4); }
.st-good  { color: #fff; background: var(--indigo); border-color: var(--indigo); }
.st-done-msg {
  text-align: center;
  padding: 20px;
  color: var(--t2);
  font-size: 14px;
  display: none;
}
</style>
</head>
<body>

<div id="header">
  <div class="h-left">
    <div class="h-title">N2 文法・聴解</div>
    <div class="h-sub" id="h-sub">Loading…</div>
  </div>
  <div class="h-right">
    <button class="hbtn on" id="ruby-btn" onclick="toggleRuby()">ふり</button>
    <button class="hbtn" id="freq-btn" onclick="toggleFreq()">⚠️ Only</button>
    <button class="hbtn" id="size-btn" onclick="cycleSize()">A</button>
    <button class="hbtn study-btn" onclick="openStudy()">Study</button>
  </div>
</div>

<div id="main"></div>

<nav id="nav"></nav>

<!-- Study overlay -->
<div id="study">
  <div class="st-header">
    <div>
      <div class="st-info" id="st-info">Study Mode</div>
      <div class="st-sub" id="st-sub"></div>
    </div>
    <button class="st-close" onclick="closeStudy()">✕</button>
  </div>
  <div class="st-prog-wrap">
    <div class="st-prog"><div class="st-prog-fill" id="st-prog-fill" style="width:0%"></div></div>
  </div>
  <div class="st-body">
    <div class="st-card" id="st-card" onclick="flipCard()">
      <div class="st-front" id="st-front"></div>
      <div class="st-back"  id="st-back"></div>
    </div>
  </div>
  <div class="st-done-msg" id="st-done">
    🎉 Done! All cards reviewed.<br><br>
    <button class="hbtn" onclick="restartStudy()">Restart</button>
  </div>
  <div class="st-actions" id="st-actions">
    <button class="st-again" onclick="rateCard(false)">↩ Again</button>
    <button class="st-good"  onclick="rateCard(true)">✓ Got it</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────
const CLUSTERS = [
{
  id:'A', name:'わけ Family', color:'#25406E', cat:'文法',
  desc:'わけ的四種變化：解釋原因、部分否定、斷言不可能、情理上不能做。',
  patterns:[
    { id:'A1', pat:'～わけだ', mean:'so naturally… / that explains it', freq:true,
      jp:'<ruby>毎日<rt>まいにち</rt></ruby>10<ruby>時間<rt>じかん</rt></ruby><ruby>勉強<rt>べんきょう</rt></ruby>してたんだ。<ruby>合格<rt>ごうかく</rt></ruby>するわけだ。',
      en:'"So you were studying 10 hours a day. No wonder you passed."',
      note:'Use when you just learned info that explains an already-visible result.' },
    { id:'A2', pat:'～わけではない', mean:"it's not that… (partial denial)", freq:true,
      jp:'<ruby>嫌<rt>きら</rt></ruby>いなわけではないけど、<ruby>好<rt>す</rt></ruby>きでもない。',
      en:'"It\'s not that I dislike it — I just don\'t love it either."',
      note:'Soften a statement. Not a total denial — something in between.' },
    { id:'A3', pat:'～わけがない', mean:"there's no way / impossible", freq:true,
      jp:'<ruby>彼<rt>かれ</rt></ruby>があんなひどいことをするわけがない。',
      en:'"There\'s no way he\'d do something that terrible."',
      note:'Conviction of impossibility. Stronger than 「はずがない」.' },
    { id:'A4', pat:'～わけにはいかない', mean:"can't (social/moral block)", freq:true,
      jp:'<ruby>友達<rt>ともだち</rt></ruby>との<ruby>約束<rt>やくそく</rt></ruby>を<ruby>断<rt>ことわ</rt></ruby>るわけにはいかない。',
      en:'"I can\'t back out on a promise to a friend."',
      note:'Something feels morally/socially wrong to do. Always about obligation.' },
    { id:'A5', pat:'～ないわけにはいかない', mean:"have no choice but to / can't not do", freq:true,
      jp:'お<ruby>世話<rt>せわ</rt></ruby>になった<ruby>人<rt>ひと</rt></ruby>の<ruby>葬式<rt>そうしき</rt></ruby>に<ruby>行<rt>い</rt></ruby>かないわけにはいかない。',
      en:'"I have no choice but to go to the funeral of someone who looked after me."',
      note:'Double negative = unavoidable obligation. Opposite feel from A4.' },
    { id:'A6', pat:'～わけにもいかない', mean:"can't very well do (awkward)", freq:false,
      jp:'<ruby>上司<rt>じょうし</rt></ruby>に「あなたは<ruby>間違<rt>まちが</rt></ruby>っています」とは<ruby>言<rt>い</rt></ruby>うわけにもいかない。',
      en:'"I can\'t very well tell my boss you\'re wrong."',
      note:'Similar to A4 but softer — socially awkward rather than morally wrong.' },
  ]
},
{
  id:'B', name:'もの Advanced', color:'#4A7A54', cat:'文法',
  desc:'もの系進階：逆接、委婉藉口、感嘆、強烈拒絕。',
  patterns:[
    { id:'B1', pat:'～ものの', mean:'although / granted that (but reality differs)', freq:true,
      jp:'<ruby>努力<rt>どりょく</rt></ruby>したものの、<ruby>結果<rt>けっか</rt></ruby>は<ruby>出<rt>で</rt></ruby>なかった。',
      en:'"Although I made every effort, results didn\'t come."',
      note:'More formal and resigned than のに. Acknowledges reality without blame.' },
    { id:'B2', pat:'～ものだから', mean:'because (soft explanation / apologetic)', freq:false,
      jp:'<ruby>急<rt>きゅう</rt></ruby>に<ruby>子供<rt>こども</rt></ruby>が<ruby>熱<rt>ねつ</rt></ruby>を<ruby>出<rt>だ</rt></ruby>したものだから、<ruby>遅刻<rt>ちこく</rt></ruby>してしまいました。',
      en:'"Because my child suddenly had a fever, I ended up being late."',
      note:'Soft excuse-tone. Implies the cause was out of your control.' },
    { id:'B3', pat:'～ものがある', mean:'there is something (intangible quality) about…', freq:false,
      jp:'<ruby>彼<rt>かれ</rt></ruby>の<ruby>言葉<rt>ことば</rt></ruby>には<ruby>人<rt>ひと</rt></ruby>を<ruby>動<rt>うご</rt></ruby>かすものがある。',
      en:'"There\'s something in his words that moves people."',
      note:'Expresses an ineffable, hard-to-describe quality you feel.' },
    { id:'B4', pat:'～ものか', mean:"as if I would! / no way! (strong refusal)", freq:false,
      jp:'あんな<ruby>人<rt>ひと</rt></ruby>に<ruby>謝<rt>あやま</rt></ruby>るものか！',
      en:'"As if I\'d apologize to someone like that!"',
      note:'Strong internal refusal. Often said to oneself.' },
    { id:'B5', pat:'～というものだ', mean:"that's the true nature of X / that's what X really is", freq:false,
      jp:'<ruby>人<rt>ひと</rt></ruby>に<ruby>頼<rt>たよ</rt></ruby>らず<ruby>自分<rt>じぶん</rt></ruby>でやってこそ、<ruby>本当<rt>ほんとう</rt></ruby>の<ruby>成長<rt>せいちょう</rt></ruby>というものだ。',
      en:'"Only when you do it yourself — that\'s true growth."',
      note:'Defines the essence of something. Wise/philosophical tone.' },
    { id:'B6', pat:'～というものではない', mean:"it's not simply that…", freq:true,
      jp:'<ruby>謝<rt>あやま</rt></ruby>ればいいというものではない。',
      en:'"It\'s not simply a matter of just apologizing."',
      note:'Pushes back on an oversimplified view.' },
  ]
},
{
  id:'C', name:'Formal Markers', color:'#C8942B', cat:'文法',
  desc:'書面語標記：において、によって、をきっかけに等閱讀高頻句型。',
  patterns:[
    { id:'C1', pat:'～において / における', mean:'in / at (formal context)', freq:true,
      jp:'<ruby>現代<rt>げんだい</rt></ruby><ruby>社会<rt>しゃかい</rt></ruby>において、<ruby>情報<rt>じょうほう</rt></ruby>リテラシーは<ruby>不可欠<rt>ふかけつ</rt></ruby>だ。',
      en:'"In modern society, information literacy is indispensable."',
      note:'における = noun modifier form: 現代社会における問題 (problems in modern society).' },
    { id:'C2', pat:'～に<ruby>関<rt>かん</rt></ruby>して / に<ruby>関<rt>かん</rt></ruby>する', mean:'regarding / concerning (formal)', freq:false,
      jp:'この<ruby>件<rt>けん</rt></ruby>に<ruby>関<rt>かん</rt></ruby>して、<ruby>調査中<rt>ちょうさちゅう</rt></ruby>です。',

let currentCluster = 'A';
let freqOnly = false;
let fontSize = 1; // 0=small 1=med 2=large
const FS_VALS = ['13px','15px','17px'];
const FS_LABELS = ['A⁻','A','A⁺'];

function getLearned() {
  try { return JSON.parse(localStorage.getItem('n2_learned') || '{}'); } catch { return {}; }
}
function setLearned(obj) {
  try { localStorage.setItem('n2_learned', JSON.stringify(obj)); } catch {}
}
function isLearned(id) { return !!getLearned()[id]; }
function toggleLearned(id) {
  const l = getLearned();
  l[id] ? delete l[id] : (l[id] = 1);
  setLearned(l);
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  if (currentCluster === 'Z') {
    renderCompare(main);
    updateHeader();
    return;
  }

  const cl = CLUSTERS.find(c => c.id === currentCluster);
  if (!cl) return;

  main.appendChild(buildChips(cl));

  const head = document.createElement('div');
  head.className = 'cl-head';
  head.innerHTML = `
    <div class="cl-badge" style="background:${cl.color}">${cl.id}</div>
    <div class="cl-info">
      <div class="cl-name">${cl.name}</div>
      <div class="cl-count">${cl.patterns.length} patterns</div>
      ${cl.desc ? `<div class="cl-desc">${cl.desc}</div>` : ''}
    </div>`;
  main.appendChild(head);

  let shown = 0;
  cl.patterns.forEach(p => {
    if (freqOnly && !p.freq) return;
    shown++;
    main.appendChild(makeCard(p, cl.color, cl.stamp || '注'));
  });

  if (shown === 0) {
    const msg = document.createElement('div');
    msg.style.cssText = 'color:var(--t2);font-size:13px;text-align:center;margin-top:40px;';
    msg.textContent = 'No ⚠️ patterns in this cluster.';
    main.appendChild(msg);
  }

  updateHeader();
}

function makeCard(p, color, stamp) {
  const learned = isLearned(p.id);
  const div = document.createElement('div');
  div.className = `card${div.open ? ' open' : ''}${learned ? ' learned' : ''}`;
  div.style.borderLeftColor = color;
  div.id = `card-${p.id}`;
  div.innerHTML = `
    <div class="card-top" onclick="toggleCard('${p.id}')">
      <div class="card-num">${p.id}</div>
      <div class="card-body-left">
        <div class="card-pattern">${p.pat}</div>
        <div class="card-meaning">${p.mean}</div>
        ${p.freq ? '<div class="card-tags"><span class="tag-freq">⚠️ High Freq</span></div>' : ''}
      </div>
      <div class="card-caret">▼</div>
    </div>
    <div class="card-detail">
      <div class="sep"></div>
      <button class="done-btn${learned ? ' done' : ''}" onclick="event.stopPropagation();markDone('${p.id}')">${learned ? '✓ Learned' : 'Mark learned'}</button>
      <div class="ex-jp">${p.jp}</div>
      <div class="ex-en">${p.en}</div>
      ${p.note ? `<div class="card-note"><span class="note-stamp">${stamp}</span><span class="note-text">${p.note.replace(/([A-Z1-9①-⑨]+)/g, '<b>$1</b>')}</span></div>` : ''}
    </div>`;
  return div;
}

function renderCompare(main) {
  const head = document.createElement('div');
  head.className = 'cl-head';
  head.innerHTML = `
    <div class="cl-badge" style="background:#25406E">⇄</div>
    <div class="cl-info">
      <div class="cl-name">Comparison Tables</div>
      <div class="cl-count">${COMPARES.length} comparisons</div>
    </div>`;
  main.appendChild(head);

  COMPARES.forEach(c => {
    const block = document.createElement('div');
    block.className = 'cmp-block';
    let html = `<div class="cmp-title">${c.title}</div>`;

    if (c.scale) {
      html += `<div class="scale-wrap">`;
      c.scale.forEach((s, i) => {
        html += `<div class="scale-item"><div class="scale-pat">${s.pat}</div><div class="scale-desc">${s.desc}</div></div>`;
        if (i < c.scale.length - 1) html += `<div class="scale-arr">→</div>`;
      });
      html += `</div><div class="scale-label"><span>${c.scaleLabel[0]}</span><span>${c.scaleLabel[1]}</span></div>`;
    } else {
      html += `<table class="cmp-table"><thead><tr><th>Pattern</th><th>When to use</th></tr></thead><tbody>`;
      c.rows.forEach(r => {
        html += `<tr><td>${r.pat}</td><td>${r.desc}<span class="cmp-ex">${r.ex}</span></td></tr>`;
      });
      html += `</tbody></table>`;
    }

    block.innerHTML = html;
    main.appendChild(block);
  });
}

function updateHeader() {
  const cl = currentCluster === 'Z' ? null : CLUSTERS.find(c => c.id === currentCluster);
  const learned = getLearned();
  const total = CLUSTERS.reduce((s, c) => s + c.patterns.length, 0);
  const learnedCount = Object.keys(learned).length;
  document.getElementById('h-sub').textContent =
    cl ? `${cl.name}  ·  ${learnedCount}/${total} learned` : `Comparisons  ·  ${learnedCount}/${total} learned`;
}

// ─────────────────────────────────────────────
//  NAV
// ─────────────────────────────────────────────
const CATS = ['文法', '聴解', '敬語', '語彙', '対比'];

function buildNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  CATS.forEach(cat => {
    const isCompare = cat === '対比';
    const clusters = isCompare ? [] : CLUSTERS.filter(c => c.cat === cat);
    const isActive = isCompare ? currentCluster === 'Z' : clusters.some(c => c.id === currentCluster);
    const btn = document.createElement('button');
    btn.className = `ntab${isActive ? ' active' : ''}`;
    btn.innerHTML = `<span class="ntab-name">${cat}</span><span class="ntab-day">${isCompare ? '⇄' : clusters.length + ' 類'}</span>`;
    btn.onclick = () => switchCat(cat);
    nav.appendChild(btn);
  });
}

function switchCat(cat) {
  if (cat === '対比') { switchCluster('Z'); return; }
  const clusters = CLUSTERS.filter(c => c.cat === cat);
  if (clusters.some(c => c.id === currentCluster)) { switchCluster(currentCluster); return; }
  switchCluster(clusters[0].id);
}

function buildChips(cl) {
  const wrap = document.createElement('div');
  wrap.className = 'chips';
  const siblings = CLUSTERS.filter(c => c.cat === cl.cat);
  if (siblings.length < 2) return wrap;
  siblings.forEach(c => {
    const chip = document.createElement('button');
    const isActive = c.id === currentCluster;
    chip.className = `chip${isActive ? ' active' : ''}`;
    if (isActive) chip.style.background = c.color;
    chip.textContent = c.name;
    chip.onclick = () => switchCluster(c.id);
    wrap.appendChild(chip);
  });
  return wrap;
}

function switchCluster(id) {
  currentCluster = id;
  buildNav();
  render();
  document.getElementById('main').scrollTop = 0;
}

// ─────────────────────────────────────────────
//  CARD INTERACTIONS
// ─────────────────────────────────────────────
function toggleCard(id) {
  const el = document.getElementById(`card-${id}`);
  if (!el) return;
  el.classList.toggle('open');
}

function markDone(id) {
  toggleLearned(id);
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  const btn = card.querySelector('.done-btn');
  const learned = isLearned(id);
  btn.textContent = learned ? '✓ Learned' : 'Mark learned';
  btn.className = `done-btn${learned ? ' done' : ''}`;
  card.classList.toggle('learned', learned);
  updateHeader();
}

function toggleFreq() {
  freqOnly = !freqOnly;
  const btn = document.getElementById('freq-btn');
  btn.classList.toggle('on', freqOnly);
  render();
}

let rubyOn = true;
function toggleRuby() {
  rubyOn = !rubyOn;
  document.body.classList.toggle('hide-ruby', !rubyOn);
  document.getElementById('ruby-btn').classList.toggle('on', rubyOn);
}

function cycleSize() {
  fontSize = (fontSize + 1) % 3;
  document.documentElement.style.setProperty('--fs', FS_VALS[fontSize]);
  document.getElementById('size-btn').textContent = FS_LABELS[fontSize];
}

// ─────────────────────────────────────────────
//  STUDY MODE
// ─────────────────────────────────────────────
let studyQueue = [];
let studyIdx = 0;
let studyFlipped = false;

function openStudy() {
  const cl = CLUSTERS.find(c => c.id === currentCluster);
  const pool = cl
    ? cl.patterns.filter(p => !freqOnly || p.freq)
    : CLUSTERS.flatMap(c => c.patterns.filter(p => !freqOnly || p.freq));

  studyQueue = [...pool].sort(() => Math.random() - 0.5);
  studyIdx = 0;
  studyFlipped = false;

  document.getElementById('study').classList.add('open');
  document.getElementById('st-done').style.display = 'none';
  document.getElementById('st-actions').style.display = 'flex';
  document.getElementById('st-card').style.display = 'block';

  const name = cl ? cl.name : 'All Clusters';
  document.getElementById('st-info').textContent = `Study — ${name}`;

  showStudyCard();
}

function closeStudy() {
  document.getElementById('study').classList.remove('open');
}

function showStudyCard() {
  if (studyIdx >= studyQueue.length) {
    document.getElementById('st-done').style.display = 'block';
    document.getElementById('st-actions').style.display = 'none';
    document.getElementById('st-card').style.display = 'none';
    return;
  }
  const p = studyQueue[studyIdx];
  const cl = CLUSTERS.find(c => c.patterns.some(x => x.id === p.id));
  studyFlipped = false;
  document.getElementById('st-card').classList.remove('flipped');

  document.getElementById('st-front').innerHTML = `
    <div class="st-card-id">${p.id} ${cl ? '· ' + cl.name : ''}</div>
    <div class="st-pattern">${p.pat}</div>
    <div class="st-meaning">${p.mean}</div>
    <div class="st-hint">Tap to see example →</div>`;

  document.getElementById('st-back').innerHTML = `
    <div class="st-card-id">${p.id} ${cl ? '· ' + cl.name : ''}</div>
    <div class="st-pattern" style="font-size:18px">${p.pat}</div>
    <div class="st-ex-jp" style="margin-top:12px">${p.jp}</div>
    <div class="st-ex-en">${p.en}</div>
    ${p.note ? `<div class="st-note">${p.note}</div>` : ''}`;

  const pct = Math.round((studyIdx / studyQueue.length) * 100);
  document.getElementById('st-prog-fill').style.width = pct + '%';
  document.getElementById('st-sub').textContent = `${studyIdx + 1} / ${studyQueue.length}`;
}

function flipCard() {
  studyFlipped = !studyFlipped;
  document.getElementById('st-card').classList.toggle('flipped', studyFlipped);
}

function rateCard(good) {
  if (!studyFlipped) { flipCard(); return; }
  if (good) markDone(studyQueue[studyIdx].id);
  studyIdx++;
  showStudyCard();
}

function restartStudy() {
  studyIdx = 0;
  studyQueue.sort(() => Math.random() - 0.5);
  document.getElementById('st-done').style.display = 'none';
  document.getElementById('st-actions').style.display = 'flex';
  document.getElementById('st-card').style.display = 'block';
  showStudyCard();
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
buildNav();
render();
</script>
</body>
</html>
